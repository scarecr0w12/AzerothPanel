services:
  # ─── Backend API ─────────────────────────────────────────────────────────────
  # network_mode: host lets the container reach MySQL/SOAP that run on the host
  # (127.0.0.1 inside the container resolves to the host machine).
  # NOTE: with host networking, `ports:` has no effect — the container shares
  #       the host's network stack directly.
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      # Use BuildKit for better caching (run: DOCKER_BUILDKIT=1 docker-compose build)
      args:
        - BUILDKIT_INLINE_CACHE=1
    container_name: azerothpanel-backend
    restart: unless-stopped
    env_file: ./backend/.env
    network_mode: host
    environment:
      # TCP address for the host process daemon (ac_host_daemon.py).
      # The backend uses network_mode: host so 127.0.0.1 in the container is the
      # host loopback — no bind-mount needed.
      - AC_DAEMON_HOST=${AC_DAEMON_HOST:-127.0.0.1}
      - AC_DAEMON_PORT=${AC_DAEMON_PORT:-7879}
    volumes:
      # AC_PATH is read from .env (root). Falls back to /opt/azerothcore.
      - ${AC_PATH:-/opt/azerothcore}:${AC_PATH:-/opt/azerothcore}:rw
      # CLIENT_PATH is read from .env (root). Used for WoW client data extraction.
      # Set this to the path of your WoW 3.3.5a client on the host machine.
      # Mounted as rw so extraction tools can write output files.
      - ${CLIENT_PATH:-/root/clientdata}:${CLIENT_PATH:-/root/clientdata}:rw
      # Persist the panel SQLite database and application logs on the host
      - ./data:/data
      # MySQL UNIX socket — required so the installer can reach MySQL as root
      # via auth_socket (TCP connections are rejected by auth_socket on Debian/Ubuntu).
      - /var/run/mysqld:/var/run/mysqld:ro
      # Persist pip cache to speed up rebuilds
      - pip_cache:/root/.cache/pip

  # ─── Frontend (nginx) ────────────────────────────────────────────────────────
  # Multi-stage Dockerfile: builds the React app, then serves it with nginx.
  # nginx proxies /api/ and /ws/ to the backend on the host (port 8000).
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      # Use BuildKit for better caching (run: DOCKER_BUILDKIT=1 docker-compose build)
      args:
        - BUILDKIT_INLINE_CACHE=1
      # Persist npm cache across builds
    container_name: azerothpanel-frontend
    restart: unless-stopped
    ports:
      # PANEL_PORT is read from .env (root). Falls back to 80.
      - "${PANEL_PORT:-80}:80"
    extra_hosts:
      # Resolves host.docker.internal → host machine IP (Linux requires this)
      - "host.docker.internal:host-gateway"
    depends_on:
      - backend

volumes:
  pip_cache:

