name: Stale Issues & PRs

on:
  schedule:
    - cron: "0 8 * * 1" # Every Monday at 08:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark and close stale items
    runs-on: ubuntu-latest

    steps:
      - uses: actions/stale@v9
        with:
          # ── Issues ──────────────────────────────────────────────────────
          stale-issue-message: >
            This issue has been automatically marked as stale because it has
            had no activity for **30 days**. It will be closed in **7 days**
            unless there is new activity or the `pinned` label is applied.

          close-issue-message: >
            This issue was closed automatically after 37 days of inactivity.
            Please reopen it if it is still relevant or if you have additional
            information.

          days-before-issue-stale: 30
          days-before-issue-close: 7

          # ── Pull Requests ────────────────────────────────────────────────
          stale-pr-message: >
            This pull request has been automatically marked as stale because it
            has had no activity for **60 days**. It will be closed in **14 days**
            unless there is new activity.

          close-pr-message: >
            This pull request was closed automatically after 74 days of
            inactivity. Please reopen it if you still intend to merge it.

          days-before-pr-stale: 60
          days-before-pr-close: 14

          # ── Labels ───────────────────────────────────────────────────────
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          exempt-issue-labels: "pinned,security,bug,in-progress"
          exempt-pr-labels: "pinned,security,in-progress"
          exempt-all-milestones: true

          # ── Limits ───────────────────────────────────────────────────────
          operations-per-run: 100
