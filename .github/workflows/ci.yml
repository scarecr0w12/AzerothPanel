name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — Type Check & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Production build
        run: npm run build

  # ─── Backend ──────────────────────────────────────────────────────────────
  backend:
    name: Backend — Syntax & Import Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check — all Python files
        run: |
          find app -name "*.py" | sort | xargs python -m py_compile
          echo "All Python files passed syntax check."

      - name: Import check — application entry point
        run: |
          # Verify that the FastAPI app can be imported without errors.
          # Uses a no-op .env so Pydantic settings doesn't abort.
          # PANEL_LOG_DIR must point somewhere the runner can write to;
          # app/main.py calls Path(PANEL_LOG_DIR).mkdir() at import time.
          cp .env.example .env
          PANEL_LOG_DIR=/tmp/panel-logs python -c "import app.main; print('Import OK')"

  # ─── Docker Compose validation ────────────────────────────────────────────
  docker-lint:
    name: Docker — Compose Config Validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up env files for compose validation
        run: |
          # docker-compose.yml references env_file: ./backend/.env which must
          # exist for `docker compose config` to succeed. Copy the examples.
          cp .env.example .env
          cp backend/.env.example backend/.env

      - name: Validate docker-compose.yml
        run: docker compose config --quiet
